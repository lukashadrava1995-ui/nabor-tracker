<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Náborový tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --info-bg:#e6f1fb;--info-text:#185fa5;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;
  --text:#f0efe9;--text2:#a8a8a4;--text3:#6b6b67;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --info-bg:#0c447c;--info-text:#b5d4f4;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
h1{font-size:20px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
select,input[type=text]{font-size:13px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);height:34px;outline:none}
select:focus,input[type=text]:focus{box-shadow:0 0 0 2px var(--info-bg)}
input[type=text]{width:160px}
.btn{background:transparent;border:0.5px solid var(--border2);border-radius:var(--r-md);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px;height:34px;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.98)}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--bg2);border-radius:var(--r-md);padding:12px 16px}
.mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.mc-val{font-size:24px;font-weight:500}
.mc-alert .mc-val{color:#a32d2d}
@media(prefers-color-scheme:dark){.mc-alert .mc-val{color:#f7c1c1}}

/* Card / table */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg2);font-weight:500;font-size:12px;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{color:var(--text)}
td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:99px}
.days-ok{background:#eaf3de;color:#3b6d11}
.days-warn{background:#faeeda;color:#854f0b}
.days-alert{background:#fcebeb;color:#a32d2d}
@media(prefers-color-scheme:dark){
  .days-ok{background:#27500a;color:#c0dd97}
  .days-warn{background:#633806;color:#fac775}
  .days-alert{background:#791f1f;color:#f7c1c1}
}
.phase-badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:99px;background:var(--info-bg);color:var(--info-text);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Funnel */
.funnel-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.funnel-table td:nth-child(3){font-weight:500;font-size:15px}
.funnel-table td:nth-child(4),.funnel-table td:nth-child(5){color:var(--text2)}
.funnel-table td:nth-child(6){color:#a32d2d}
@media(prefers-color-scheme:dark){.funnel-table td:nth-child(6){color:#f7c1c1}}
.funnel-bar-wrap{width:100%;background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.funnel-bar{height:6px;background:var(--info-text);border-radius:4px;transition:width 0.3s}
.f-first td:nth-child(3){color:#185fa5}
.f-last td:nth-child(3){color:#3b6d11}

/* Status */
.status{padding:1.5rem;text-align:center;color:var(--text2);font-size:13px}
.status.error{color:#a32d2d}
.empty{padding:2.5rem;text-align:center;color:var(--text2)}
.footer{margin-top:1rem;font-size:12px;color:var(--text3);text-align:right}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--info-text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
<h1><i class="ti ti-user-check" style="font-size:22px"></i>Náborový tracker</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tracker')"><i class="ti ti-list"></i> Aktuální stav</button>
  <button class="tab" onclick="switchTab('funnel')"><i class="ti ti-filter"></i> Funnel po kohortách</button>
</div>

<!-- TAB 1: Aktuální stav -->
<div id="tab-tracker" class="tab-panel active">
  <div class="controls">
    <input type="text" id="search" placeholder="Hledat jméno…">
    <select id="fLoc"><option value="">Všechny lokality</option></select>
    <select id="fPhase"><option value="">Všechny fáze</option></select>
    <select id="fDays">
      <option value="">Všechny délky</option>
      <option value="ok">Do 7 dní</option>
      <option value="warn">8–14 dní</option>
      <option value="alert">15+ dní</option>
    </select>
    <button class="btn" id="btnRefresh"><i class="ti ti-refresh"></i>Aktualizovat</button>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Celkem uchazečů</div><div class="mc-val" id="mTotal">–</div></div>
    <div class="mc"><div class="mc-label">Průměr dní ve fázi</div><div class="mc-val" id="mAvg">–</div></div>
    <div class="mc mc-alert"><div class="mc-label">15+ dní (alert)</div><div class="mc-val" id="mAlert">–</div></div>
    <div class="mc"><div class="mc-label">Lokalit</div><div class="mc-val" id="mLoc">–</div></div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:70px">ID</th>
          <th class="sortable" data-col="surname" style="width:150px">Příjmení <i class="ti ti-arrows-sort"></i></th>
          <th class="sortable" data-col="location" style="width:110px">Lokalita <i class="ti ti-arrows-sort"></i></th>
          <th style="min-width:200px">Fáze</th>
          <th class="sortable" data-col="since" style="width:130px">Ve stavu od <i class="ti ti-arrows-sort"></i></th>
          <th class="sortable" data-col="days" style="width:75px">Dní <i class="ti ti-arrows-sort"></i></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="statusMsg" class="status" style="display:none"></div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<!-- TAB 2: Funnel -->
<div id="tab-funnel" class="tab-panel">
  <div class="funnel-controls">
    <select id="fSklad"><option value="">Všechny sklady</option></select>
    <select id="fTyden"></select>
    <button class="btn" id="btnFunnelRefresh"><i class="ti ti-refresh"></i>Aktualizovat</button>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Kohorta (vyplnili formulář)</div><div class="mc-val" id="fmKohorta">–</div></div>
    <div class="mc"><div class="mc-label">Aktivní v procesu</div><div class="mc-val" id="fmAktivni">–</div></div>
    <div class="mc mc-alert"><div class="mc-label">Odpad (ukončen/nemá zájem)</div><div class="mc-val" id="fmOdpad">–</div></div>
    <div class="mc"><div class="mc-label">Dokončeno</div><div class="mc-val" id="fmDone" style="color:#3b6d11">–</div></div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table class="funnel-table">
        <thead><tr>
          <th style="width:40px">#</th>
          <th>Fáze náboru</th>
          <th style="width:80px">Počet</th>
          <th style="width:110px">% ze vstupu</th>
          <th style="width:130px">% z předchozího</th>
          <th style="width:110px">Odpad z kroku</th>
          <th style="width:200px">Průběh</th>
        </tr></thead>
        <tbody id="funnelBody"></tbody>
      </table>
    </div>
    <div id="funnelStatus" class="status" style="display:none"></div>
  </div>
  <div class="footer" id="funnelFooter"></div>
</div>
</div>

<script>
const SHEET_ID   = '1Uv2FopQw5G9R1zvHaklswL9r_gqSO8RqJZ_vH7LzfQk';
const GID_HR     = '1690462673';
const GID_FILTR  = '1770469936';
const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;

const FAZE = [
  'V čekačce',
  'Čekáme na výběr termínu informační jízdy',
  'Čeká na informační jízdu',
  'Informační schůzka OK, čekáme na feedback',
  'Čekáme na podpis smlouvy',
  'Čekáme na dokončení online teorie',
  'Čekáme na výběr termínu první jízdy',
  'První jízda',
  'Závěrečný test',
  'Dokončeno',
];
const FAZE_IDX = {};
FAZE.forEach((f,i) => FAZE_IDX[f.toLowerCase().trim()] = i);

const ODPAD = new Set([
  'ukončen - naše žádost','ukončen','ukončen - vlastní žádost',
  'nemá zájem','nemá zájem - nereaguje','nemá zájem - vlastní žádost',
  'nemáme zájem','ukončen pro neaktivitu',
]);

// ===== CSV PARSER =====
function parseCSVLine(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){r.push(cur);cur='';}
    else{cur+=c;}
  }
  r.push(cur);return r;
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const rawH=parseCSVLine(lines[0]).map(h=>h.trim());
  const header=rawH.map(h=>h.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]);
    if(!vals.some(v=>v.trim()))continue;
    const obj={_vals:vals.map(v=>(v||'').trim()),_header:header};
    header.forEach((h,idx)=>{if(!(h in obj))obj[h]=(vals[idx]||'').trim();});
    rows.push(obj);
  }
  return rows;
}

// ===== DATE UTILS =====
function parseCzDate(str){
  if(!str)return null;
  const m=str.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(str.replace(' ','T'));
  return isNaN(d)?null:d;
}
function daysSince(str){
  const d=parseCzDate(str);
  if(!d)return null;
  return Math.floor((Date.now()-d.getTime())/86400000);
}
function formatDate(str){
  const d=parseCzDate(str);
  if(!d)return str||'–';
  return d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function getWeekLabel(dateStr){
  let d=dateStr instanceof Date?dateStr:new Date(dateStr);
  if(isNaN(d))return null;
  const utc=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=utc.getUTCDay()||7;
  utc.setUTCDate(utc.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(utc.getUTCFullYear(),0,1));
  const week=Math.ceil((((utc-yearStart)/86400000)+1)/7);
  return utc.getUTCFullYear()+'-T'+String(week).padStart(2,'0');
}

// ===== TABS =====
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if(name==='funnel'&&!funnelLoaded)loadFunnel();
}

// ===== TAB 1: TRACKER =====
let allRows=[];
let sortCol='days';
let sortDir=-1;
let funnelLoaded=false;
let hrCache=null;

async function loadHR(){
  if(hrCache)return hrCache;
  const resp=await fetch(csvUrl(GID_HR));
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  hrCache=parseCSV(await resp.text());
  return hrCache;
}

async function loadTracker(){
  const msg=document.getElementById('statusMsg');
  const tbody=document.getElementById('tbody');
  msg.style.display='block';msg.className='status';
  msg.innerHTML='<span class="spinner"></span>Načítám data…';
  tbody.innerHTML='';

  try{
    const [respFiltr,rawHR]=await Promise.all([
      fetch(csvUrl(GID_FILTR)).then(r=>r.text()),
      loadHR()
    ]);
    const rawFiltr=parseCSV(respFiltr);

    // Filtr_procesu: mapa id → Ve stavu od
    const sinceMap={};
    if(rawFiltr.length){
      const f=rawFiltr[0];
      const fIdIdx=f._header.findIndex(h=>h==='hiring_id');
      const fSinceIdx=f._header.findIndex(h=>h==='ve_stavu_od');
      rawFiltr.forEach(r=>{
        const id=fIdIdx>=0?r._vals[fIdIdx]:'';
        const since=fSinceIdx>=0?r._vals[fSinceIdx]:'';
        if(id)sinceMap[id]=since;
      });
    }

    // HR data
    const hr=rawHR[0];
    const idIdx   =hr._header.findIndex(h=>h==='hiring_id');
    const surIdx  =hr._header.findIndex(h=>h==='surname');
    const nameIdx =hr._header.findIndex(h=>h==='name');
    const locIdx  =hr._header.findIndex(h=>h==='hiring_location');
    const stateIdx=hr._header.findIndex(h=>h==='state_desc');

    allRows=rawHR.filter(r=>{
      if(!(r._vals[surIdx]||r._vals[nameIdx]))return false;
      const state=(r._vals[stateIdx]||'').toLowerCase().trim();
      if(ODPAD.has(state)||state==='dokončeno')return false;
      return FAZE_IDX[state]!==undefined;
    }).map(r=>{
      const id=idIdx>=0?r._vals[idIdx]:'';
      const since=sinceMap[id]||'';
      return{
        id,
        surname:surIdx>=0?r._vals[surIdx]:'',
        name:nameIdx>=0?r._vals[nameIdx]:'',
        location:locIdx>=0?r._vals[locIdx]:'',
        phase:stateIdx>=0?r._vals[stateIdx]:'',
        since,
        days:since?daysSince(since):null
      };
    });

    populateTrackerFilters();
    renderTracker();
    msg.style.display='none';
    document.getElementById('footer').textContent='Poslední aktualizace: '+new Date().toLocaleString('cs-CZ');
  }catch(e){
    msg.className='status error';
    msg.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>Nepodařilo se načíst data. Zkontroluj sdílení listu.<br><small>'+e.message+'</small>';
  }
}

function daysClass(n){if(n===null)return'';if(n<=7)return'days-ok';if(n<=14)return'days-warn';return'days-alert';}

function populateTrackerFilters(){
  const locs=[...new Set(allRows.map(r=>r.location).filter(Boolean))].sort();
  const phases=[...new Set(allRows.map(r=>r.phase).filter(Boolean))].sort();
  const fLoc=document.getElementById('fLoc');
  const fPhase=document.getElementById('fPhase');
  const cL=fLoc.value,cP=fPhase.value;
  fLoc.innerHTML='<option value="">Všechny lokality</option>'+locs.map(l=>`<option>${l}</option>`).join('');
  fPhase.innerHTML='<option value="">Všechny fáze</option>'+phases.map(p=>`<option>${p}</option>`).join('');
  fLoc.value=cL;fPhase.value=cP;
}

function getFilteredTracker(){
  const q=document.getElementById('search').value.toLowerCase();
  const loc=document.getElementById('fLoc').value;
  const phase=document.getElementById('fPhase').value;
  const days=document.getElementById('fDays').value;
  return allRows.filter(r=>{
    if(q&&!(r.surname+' '+r.name).toLowerCase().includes(q))return false;
    if(loc&&r.location!==loc)return false;
    if(phase&&r.phase!==phase)return false;
    if(days==='ok'&&!(r.days!==null&&r.days<=7))return false;
    if(days==='warn'&&!(r.days!==null&&r.days>=8&&r.days<=14))return false;
    if(days==='alert'&&!(r.days!==null&&r.days>=15))return false;
    return true;
  });
}

function renderTracker(){
  const filtered=getFilteredTracker();
  const sorted=[...filtered].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(sortCol==='days'){av=av??-1;bv=bv??-1;}
    if(sortCol==='since'){av=parseCzDate(av)||0;bv=parseCzDate(bv)||0;}
    return av<bv?sortDir:av>bv?-sortDir:0;
  });
  const tbody=document.getElementById('tbody');
  if(!sorted.length){
    tbody.innerHTML='<tr><td colspan="6" class="empty">Žádní uchazeči neodpovídají filtru.</td></tr>';
  }else{
    tbody.innerHTML=sorted.map(r=>`<tr>
      <td style="color:var(--text2);font-size:12px">${r.id}</td>
      <td style="font-weight:500">${r.surname}${r.name?' '+r.name:''}</td>
      <td style="color:var(--text2)">${r.location||'–'}</td>
      <td><span class="phase-badge" title="${r.phase}">${r.phase||'–'}</span></td>
      <td style="color:var(--text2);font-size:12px">${formatDate(r.since)}</td>
      <td><span class="badge ${daysClass(r.days)}">${r.days!==null?r.days+' d':'–'}</span></td>
    </tr>`).join('');
  }
  const a15=filtered.filter(r=>r.days!==null&&r.days>=15).length;
  const dArr=filtered.filter(r=>r.days!==null).map(r=>r.days);
  const avg=dArr.length?Math.round(dArr.reduce((s,v)=>s+v,0)/dArr.length):null;
  const locs=new Set(filtered.map(r=>r.location).filter(Boolean));
  document.getElementById('mTotal').textContent=filtered.length;
  document.getElementById('mAvg').textContent=avg!==null?avg:'–';
  document.getElementById('mAlert').textContent=a15;
  document.getElementById('mLoc').textContent=locs.size;
}

['search','fLoc','fPhase','fDays'].forEach(id=>{
  document.getElementById(id).addEventListener('input',renderTracker);
  document.getElementById(id).addEventListener('change',renderTracker);
});
document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
    renderTracker();
  });
});
document.getElementById('btnRefresh').addEventListener('click',()=>{hrCache=null;loadTracker();});

// ===== TAB 2: FUNNEL =====
let funnelData=[];

async function loadFunnel(){
  const msg=document.getElementById('funnelStatus');
  msg.style.display='block';msg.className='status';
  msg.innerHTML='<span class="spinner"></span>Načítám data…';

  try{
    const rawHR=await loadHR();
    const hr=rawHR[0];
    const idIdx   =hr._header.findIndex(h=>h==='hiring_id');
    const locIdx  =hr._header.findIndex(h=>h==='hiring_location');
    const stateIdx=hr._header.findIndex(h=>h==='state_desc');
    const crIdx   =hr._header.findIndex(h=>h==='created_at');

    const sklady=new Set();
    const tydny=new Set();
    funnelData=[];

    // Deduplikace podle hiring_id – ponecháme poslední výskyt
    const seenIds = new Set();
    const dedupHR = [...rawHR].reverse().filter(r => {
      const id = idIdx >= 0 ? r._vals[idIdx] : '';
      if (!id || seenIds.has(id)) return false;
      seenIds.add(id);
      return true;
    });

    dedupHR.forEach(r=>{
      const loc  =locIdx>=0?r._vals[locIdx]:'';
      const state=(stateIdx>=0?r._vals[stateIdx]:'').toLowerCase().trim();
      const cr   =crIdx>=0?r._vals[crIdx]:'';
      if(!loc||!cr)return;
      const tyden=getWeekLabel(cr);
      if(!tyden)return;
      sklady.add(loc);
      tydny.add(tyden);
      funnelData.push({loc,state,tyden});
    });

    const skladList=[...sklady].sort();
    const tydenList=[...tydny].sort().reverse();

    const fSklad=document.getElementById('fSklad');
    const fTyden=document.getElementById('fTyden');
    fSklad.innerHTML='<option value="">Všechny sklady</option>'+skladList.map(s=>`<option>${s}</option>`).join('');
    fTyden.innerHTML=tydenList.map(t=>`<option>${t}</option>`).join('');

    msg.style.display='none';
    funnelLoaded=true;
    renderFunnel();
  }catch(e){
    msg.className='status error';
    msg.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>Chyba: '+e.message;
  }
}

function renderFunnel(){
  const sklad=document.getElementById('fSklad').value;
  const tyden=document.getElementById('fTyden').value;

  const kohorta=funnelData.filter(u=>{
    if(u.tyden!==tyden)return false;
    if(sklad&&u.loc!==sklad)return false;
    return true;
  });

  const celkem=kohorta.length;
  const odpadCount=kohorta.filter(u=>ODPAD.has(u.state)).length;
  const aktivni=celkem-odpadCount;
  const doneCount=kohorta.filter(u=>u.state==='dokončeno').length;

  document.getElementById('fmKohorta').textContent=celkem;
  document.getElementById('fmAktivni').textContent=aktivni;
  document.getElementById('fmOdpad').textContent=odpadCount;
  document.getElementById('fmDone').textContent=doneCount;

  const counts=FAZE.map((_,fazIdx)=>
    kohorta.filter(u=>{
      const idx=FAZE_IDX[u.state];
      return idx!==undefined&&idx>=fazIdx;
    }).length
  );

  const vstup=counts[0]||1;
  const tbody=document.getElementById('funnelBody');
  tbody.innerHTML=FAZE.map((faze,i)=>{
    const count=counts[i];
    const pctVstupu=celkem>0?(count/celkem*100).toFixed(1)+'%':'–';
    const pctPred=i===0?'–':(counts[i-1]>0?(count/counts[i-1]*100).toFixed(1)+'%':'–');
    const odpad=i===0?odpadCount:counts[i-1]-counts[i];
    const barW=vstup>0?Math.round(count/vstup*100):0;
    const rowClass=i===0?'f-first':i===FAZE.length-1?'f-last':'';
    return`<tr class="${rowClass}">
      <td style="color:var(--text2)">${i+1}</td>
      <td>${faze}</td>
      <td>${count}</td>
      <td style="color:var(--text2)">${pctVstupu}</td>
      <td style="color:var(--text2)">${pctPred}</td>
      <td>${odpad>0?'−'+odpad:''}</td>
      <td><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join('');

  document.getElementById('funnelFooter').textContent=
    `Sklad: ${sklad||'Všechny'} | Týden: ${tyden} | Kohorta: ${celkem} | Aktualizováno: ${new Date().toLocaleString('cs-CZ')}`;
}

document.getElementById('fSklad').addEventListener('change',renderFunnel);
document.getElementById('fTyden').addEventListener('change',renderFunnel);
document.getElementById('btnFunnelRefresh').addEventListener('click',()=>{hrCache=null;funnelLoaded=false;loadFunnel();});

// Start
loadTracker();
</script>
