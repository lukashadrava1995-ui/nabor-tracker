<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Náborový tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);--info-bg:#e6f1fb;--info-text:#185fa5;--r-md:8px;--r-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;--text:#f0efe9;--text2:#a8a8a4;--text3:#6b6b67;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);--info-bg:#0c447c;--info-text:#b5d4f4}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
h1{font-size:20px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.tab-panel{display:none}.tab-panel.active{display:block}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
select,input[type=text]{font-size:13px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);height:34px;outline:none}
select:focus,input[type=text]:focus{box-shadow:0 0 0 2px var(--info-bg)}
input[type=text]{width:160px}
.btn{background:transparent;border:0.5px solid var(--border2);border-radius:var(--r-md);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px;height:34px;white-space:nowrap}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(0.98)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--bg2);border-radius:var(--r-md);padding:12px 16px}
.mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.mc-val{font-size:24px;font-weight:500}
.mc-alert .mc-val{color:#a32d2d}
@media(prefers-color-scheme:dark){.mc-alert .mc-val{color:#f7c1c1}}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg2);font-weight:500;font-size:12px;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}th.sortable:hover{color:var(--text)}
td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg2)}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:99px}
.days-ok{background:#eaf3de;color:#3b6d11}.days-warn{background:#faeeda;color:#854f0b}.days-alert{background:#fcebeb;color:#a32d2d}
@media(prefers-color-scheme:dark){.days-ok{background:#27500a;color:#c0dd97}.days-warn{background:#633806;color:#fac775}.days-alert{background:#791f1f;color:#f7c1c1}}
.phase-badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:99px;background:var(--info-bg);color:var(--info-text);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.funnel-bar-wrap{width:100%;background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.funnel-bar{height:6px;background:var(--info-text);border-radius:4px}
.f-first td:nth-child(3){color:#185fa5;font-weight:500}.f-last td:nth-child(3){color:#3b6d11;font-weight:500}
.status{padding:1.5rem;text-align:center;color:var(--text2);font-size:13px}
.status.error{color:#a32d2d}
.empty{padding:2.5rem;text-align:center;color:var(--text2)}
.footer{margin-top:1rem;font-size:12px;color:var(--text3);text-align:right}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--info-text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
<h1><i class="ti ti-user-check" style="font-size:22px"></i>Náborový tracker</h1>
<div class="tabs">
  <button class="tab active" onclick="switchTab('tracker',this)"><i class="ti ti-list"></i> Aktuální stav</button>
  <button class="tab" onclick="switchTab('funnel',this)"><i class="ti ti-filter"></i> Funnel po kohortách</button>
</div>

<!-- TAB 1 -->
<div id="tab-tracker" class="tab-panel active">
  <div class="controls">
    <input type="text" id="search" placeholder="Hledat jméno…">
    <select id="fLoc"><option value="">Všechny lokality</option></select>
    <select id="fPhase"><option value="">Všechny fáze</option></select>
    <select id="fDays">
      <option value="">Všechny délky</option>
      <option value="ok">Do 7 dní</option>
      <option value="warn">8–14 dní</option>
      <option value="alert">15+ dní</option>
    </select>
    <button class="btn" id="btnRefresh"><i class="ti ti-refresh"></i>Aktualizovat</button>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Celkem uchazečů</div><div class="mc-val" id="mTotal">–</div></div>
    <div class="mc"><div class="mc-label">Průměr dní ve fázi</div><div class="mc-val" id="mAvg">–</div></div>
    <div class="mc mc-alert"><div class="mc-label">15+ dní (alert)</div><div class="mc-val" id="mAlert">–</div></div>
    <div class="mc"><div class="mc-label">Lokalit</div><div class="mc-val" id="mLoc">–</div></div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:70px">ID</th>
          <th class="sortable" data-col="surname" style="width:150px">Příjmení <i class="ti ti-arrows-sort"></i></th>
          <th class="sortable" data-col="location" style="width:110px">Lokalita <i class="ti ti-arrows-sort"></i></th>
          <th style="min-width:200px">Fáze</th>
          <th class="sortable" data-col="since" style="width:130px">Ve stavu od <i class="ti ti-arrows-sort"></i></th>
          <th class="sortable" data-col="days" style="width:75px">Dní <i class="ti ti-arrows-sort"></i></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="statusMsg" class="status" style="display:none"></div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<!-- TAB 2 -->
<div id="tab-funnel" class="tab-panel">
  <div class="controls">
    <select id="fSklad"><option value="">Všechny sklady</option></select>
    <select id="fTyden"></select>
    <button class="btn" id="btnFunnelRefresh"><i class="ti ti-refresh"></i>Aktualizovat</button>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Kohorta (vyplnili formulář)</div><div class="mc-val" id="fmKohorta">–</div></div>
    <div class="mc"><div class="mc-label">Aktivní v procesu</div><div class="mc-val" id="fmAktivni">–</div></div>
    <div class="mc mc-alert"><div class="mc-label">Odpad</div><div class="mc-val" id="fmOdpad">–</div></div>
    <div class="mc"><div class="mc-label">Dokončeno</div><div class="mc-val" id="fmDone" style="color:#3b6d11">–</div></div>
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:40px">#</th>
          <th>Fáze náboru</th>
          <th style="width:80px">Počet</th>
          <th style="width:110px">% ze vstupu</th>
          <th style="width:130px">% z předchozího</th>
          <th style="width:110px">Odpad z kroku</th>
          <th style="width:180px">Průběh</th>
        </tr></thead>
        <tbody id="funnelBody"></tbody>
      </table>
    </div>
    <div id="funnelStatus" class="status" style="display:none"></div>
  </div>
  <div class="footer" id="funnelFooter"></div>
</div>
</div>

<script>
const SHEET_ID  = '1Uv2FopQw5G9R1zvHaklswL9r_gqSO8RqJZ_vH7LzfQk';
const GID_HR    = '1690462673';
const GID_NABOR = '1567340540';
const csvUrl = gid => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
const csvNaborUrl = () => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_NABOR}&tq=${encodeURIComponent('select * where P=1')}`;
const csvHRUrl = () => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_HR}&tq=${encodeURIComponent('select A,C,D,H,K')}`;

const FAZE=['V čekačce','Čekáme na výběr termínu informační jízdy','Čeká na informační jízdu','Informační schůzka OK, čekáme na feedback','Čekáme na podpis smlouvy','Čekáme na dokončení online teorie','Čekáme na výběr termínu první jízdy','První jízda','Závěrečný test','Dokončeno'];
const FAZE_IDX={};FAZE.forEach((f,i)=>FAZE_IDX[f.toLowerCase().trim()]=i);
const ODPAD=new Set(['ukončen - naše žádost','ukončen','ukončen - vlastní žádost','nemá zájem','nemá zájem - nereaguje','nemá zájem - vlastní žádost','nemáme zájem','ukončen pro neaktivitu']);

function parseCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){r.push(cur);cur='';}else{cur+=c;}}r.push(cur);return r;}
function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return{header:[],rows:[]};
  const header=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){const vals=parseCSVLine(lines[i]).map(v=>v.trim());if(!vals.some(v=>v))continue;rows.push(vals);}
  return{header,rows};
}
function colIdx(h,candidates){for(const c of candidates){const i=h.indexOf(c);if(i>=0)return i;}return -1;}

function parseCzDate(str){
  if(!str)return null;
  const m=str.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const n=parseFloat(str);
  if(!isNaN(n)&&n>1000000000&&n<2000000000)return new Date(n*1000);
  if(!isNaN(n)&&n>40000&&n<60000)return new Date(Math.round((n-25569)*86400000));
  const d=new Date(str.replace(' ','T'));
  return isNaN(d)?null:d;
}
function daysSince(str){const d=parseCzDate(str);if(!d)return null;return Math.floor((Date.now()-d.getTime())/86400000);}
function formatDate(str){const d=parseCzDate(str);if(!d)return str||'–';return d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});}
function getWeekLabel(str){
  let d=parseCzDate(str);
  if(!d)return null;
  const utc=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=utc.getUTCDay()||7;utc.setUTCDate(utc.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(utc.getUTCFullYear(),0,1));
  const week=Math.ceil((((utc-ys)/86400000)+1)/7);
  return utc.getUTCFullYear()+'-T'+String(week).padStart(2,'0');
}

let cacheHR=null,cacheNabor=null;
async function fetchHR(){
  if(cacheHR)return cacheHR;
  const r=await fetch(csvHRUrl());
  if(!r.ok)throw new Error('HR data: HTTP '+r.status);
  cacheHR=parseCSV(await r.text());
  return cacheHR;
}
async function fetchNabor(){
  if(cacheNabor)return cacheNabor;
  const r=await fetch(csvNaborUrl());
  if(!r.ok)throw new Error('Data nábor: HTTP '+r.status);
  cacheNabor=parseCSV(await r.text());
  return cacheNabor;
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='funnel'&&!funnelLoaded)loadFunnel();
}

// TAB 1
let allRows=[],sortCol='days',sortDir=-1,funnelLoaded=false;

async function loadTracker(){
  const msg=document.getElementById('statusMsg');
  msg.style.display='block';msg.className='status';
  msg.innerHTML='<span class="spinner"></span>Načítám data…';
  document.getElementById('tbody').innerHTML='';
  try{
    const [hr,nabor]=await Promise.all([fetchHR(),fetchNabor()]);

    // HR data: select A,C,D,H,K → pevné indexy 0,1,2,3,4
    const hId=0, hSur=1, hName=2, hLoc=3, hState=4;

    // Data nábor: id → max timestamp (query vrací col0=id, col1=max_timestamp)
    // Data nábor is_max_state=1: páruj přes id = hiring_id
    const nh=nabor.header;
    const nId        = nh.indexOf('id');
    const nTimestamp = nh.indexOf('timestamp');
    const nIsMax     = nh.lastIndexOf('is_max_state');

    const tsMap={};
    const seenN=new Set();
    nabor.rows.forEach(r=>{
      const isMax=nIsMax>=0?r[nIsMax]:'';
      if(isMax!=='1')return;
      const cid=nId>=0?r[nId].replace('.0',''):'';
      const ts =nTimestamp>=0?r[nTimestamp]:'';
      if(cid&&ts&&!seenN.has(cid)){seenN.add(cid);tsMap[cid]=ts;}
    });

    // Deduplikace HR podle hiring_id
    const seen=new Set();
    allRows=[];
    hr.rows.forEach(r=>{
      const idRaw=hId>=0?r[hId]:'';
      const id=idRaw?String(Math.round(parseFloat(idRaw.replace(',','.')))):'';
      if(!id||id==='NaN'||seen.has(id))return;
      seen.add(id);
      const state=(hState>=0?r[hState]:'').toLowerCase().trim();
      if(ODPAD.has(state)||state==='dokončeno'||state==='duplicita')return;
      if(FAZE_IDX[state]===undefined)return;
      const since=tsMap[id]||'';
      allRows.push({
        id,
        surname:hSur>=0?r[hSur]:'',
        name:hName>=0?r[hName]:'',
        location:hLoc>=0?r[hLoc]:'',
        phase:hState>=0?r[hState]:'',
        since,
        days:since?daysSince(since):null
      });
    });

    populateTrackerFilters();renderTracker();
    msg.style.display='none';
    document.getElementById('footer').textContent='Poslední aktualizace: '+new Date().toLocaleString('cs-CZ')+' | Celkem: '+allRows.length;
  }catch(e){
    msg.className='status error';
    msg.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>Chyba: '+e.message;
  }
}

function daysClass(n){if(n===null)return'';if(n<=7)return'days-ok';if(n<=14)return'days-warn';return'days-alert';}

function populateTrackerFilters(){
  const locs=[...new Set(allRows.map(r=>r.location).filter(Boolean))].sort();
  const phases=[...new Set(allRows.map(r=>r.phase).filter(Boolean))].sort();
  const fLoc=document.getElementById('fLoc'),fPhase=document.getElementById('fPhase');
  const cL=fLoc.value,cP=fPhase.value;
  fLoc.innerHTML='<option value="">Všechny lokality</option>'+locs.map(l=>`<option>${l}</option>`).join('');
  fPhase.innerHTML='<option value="">Všechny fáze</option>'+phases.map(p=>`<option>${p}</option>`).join('');
  fLoc.value=cL;fPhase.value=cP;
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const loc=document.getElementById('fLoc').value;
  const phase=document.getElementById('fPhase').value;
  const days=document.getElementById('fDays').value;
  return allRows.filter(r=>{
    if(q&&!(r.surname+' '+r.name).toLowerCase().includes(q))return false;
    if(loc&&r.location!==loc)return false;
    if(phase&&r.phase!==phase)return false;
    if(days==='ok'&&!(r.days!==null&&r.days<=7))return false;
    if(days==='warn'&&!(r.days!==null&&r.days>=8&&r.days<=14))return false;
    if(days==='alert'&&!(r.days!==null&&r.days>=15))return false;
    return true;
  });
}

function renderTracker(){
  const filtered=getFiltered();
  const sorted=[...filtered].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(sortCol==='days'){av=av??-1;bv=bv??-1;}
    if(sortCol==='since'){av=parseCzDate(av)||0;bv=parseCzDate(bv)||0;}
    return av<bv?sortDir:av>bv?-sortDir:0;
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=sorted.length?sorted.map(r=>`<tr>
    <td style="color:var(--text2);font-size:12px">${r.id}</td>
    <td style="font-weight:500">${r.surname}${r.name?' '+r.name:''}</td>
    <td style="color:var(--text2)">${r.location||'–'}</td>
    <td><span class="phase-badge" title="${r.phase}">${r.phase||'–'}</span></td>
    <td style="color:var(--text2);font-size:12px">${formatDate(r.since)}</td>
    <td><span class="badge ${daysClass(r.days)}">${r.days!==null?r.days+' d':'–'}</span></td>
  </tr>`).join(''):'<tr><td colspan="6" class="empty">Žádní uchazeči neodpovídají filtru.</td></tr>';
  const a15=filtered.filter(r=>r.days!==null&&r.days>=15).length;
  const dArr=filtered.filter(r=>r.days!==null).map(r=>r.days);
  const avg=dArr.length?Math.round(dArr.reduce((s,v)=>s+v,0)/dArr.length):null;
  const locs=new Set(filtered.map(r=>r.location).filter(Boolean));
  document.getElementById('mTotal').textContent=filtered.length;
  document.getElementById('mAvg').textContent=avg??'–';
  document.getElementById('mAlert').textContent=a15;
  document.getElementById('mLoc').textContent=locs.size;
}

['search','fLoc','fPhase','fDays'].forEach(id=>{
  document.getElementById(id).addEventListener('input',renderTracker);
  document.getElementById(id).addEventListener('change',renderTracker);
});
document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
    renderTracker();
  });
});
document.getElementById('btnRefresh').addEventListener('click',()=>{cacheHR=null;cacheNabor=null;loadTracker();});

// TAB 2: FUNNEL
let funnelRows=[];
async function loadFunnel(){
  const msg=document.getElementById('funnelStatus');
  msg.style.display='block';msg.className='status';
  msg.innerHTML='<span class="spinner"></span>Načítám data…';
  try{
    const [hr,nabor]=await Promise.all([fetchHR(),fetchNabor()]);

    // HR: hiring_id → created_at
    const hh=hr.header;
    const hId=colIdx(hh,['hiring_id','a']);
    const hCr=colIdx(hh,['created_at']);

    const createdMap={};
    const seenHR=new Set();
    hr.rows.forEach(r=>{
      const id=hId>=0?r[hId]:'';
      if(!id||seenHR.has(id))return;
      seenHR.add(id);
      if(hCr>=0)createdMap[id]=r[hCr];
    });

    // Data nábor: courier_id, state_id, wh, is_max_state
    const nh=nabor.header;
    const nCourier=colIdx(nh,['id']);
    const nState  =colIdx(nh,['state_id']);
    const nWH     =colIdx(nh,['wh']);
    const nIsMax  =nh.lastIndexOf('is_max_state');

    const sklady=new Set(),tydny=new Set();
    funnelRows=[];
    const seenN=new Set();

    nabor.rows.forEach(r=>{
      const isMax=nIsMax>=0?r[nIsMax]:'';
      if(isMax!=='1')return;
      const cid=nCourier>=0?r[nCourier]:'';
      if(!cid||seenN.has(cid))return;
      seenN.add(cid);
      const state=(nState>=0?r[nState]:'').toLowerCase().trim();
      if(state==='duplicita')return;
      const wh=nWH>=0?r[nWH]:'';
      const created=createdMap[cid]||'';
      if(!created)return;
      const tyden=getWeekLabel(created);
      if(!tyden)return;
      sklady.add(wh);tydny.add(tyden);
      funnelRows.push({wh,state,tyden});
    });

    const skladList=[...sklady].sort();
    const tydenList=[...tydny].sort().reverse();
    const fSklad=document.getElementById('fSklad');
    const fTyden=document.getElementById('fTyden');
    fSklad.innerHTML='<option value="">Všechny sklady</option>'+skladList.map(s=>`<option>${s}</option>`).join('');
    fTyden.innerHTML=tydenList.map(t=>`<option>${t}</option>`).join('');
    msg.style.display='none';funnelLoaded=true;renderFunnel();
  }catch(e){
    msg.className='status error';
    msg.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>Chyba: '+e.message;
  }
}

function renderFunnel(){
  const sklad=document.getElementById('fSklad').value;
  const tyden=document.getElementById('fTyden').value;
  const kohorta=funnelRows.filter(u=>u.tyden===tyden&&(!sklad||u.wh===sklad));
  const celkem=kohorta.length;
  const odpadCount=kohorta.filter(u=>ODPAD.has(u.state)).length;
  const doneCount=kohorta.filter(u=>u.state==='dokončeno').length;
  document.getElementById('fmKohorta').textContent=celkem;
  document.getElementById('fmAktivni').textContent=celkem-odpadCount-doneCount;
  document.getElementById('fmOdpad').textContent=odpadCount;
  document.getElementById('fmDone').textContent=doneCount;
  const counts=FAZE.map((_,fi)=>kohorta.filter(u=>{const idx=FAZE_IDX[u.state];return idx!==undefined&&idx>=fi;}).length);
  const vstup=counts[0]||1;
  document.getElementById('funnelBody').innerHTML=FAZE.map((faze,i)=>{
    const count=counts[i];
    const pctV=celkem>0?(count/celkem*100).toFixed(1)+'%':'–';
    const pctP=i===0?'–':(counts[i-1]>0?(count/counts[i-1]*100).toFixed(1)+'%':'–');
    const odpad=i===0?odpadCount:counts[i-1]-counts[i];
    const barW=Math.round(count/vstup*100);
    const rc=i===0?'f-first':i===FAZE.length-1?'f-last':'';
    return`<tr class="${rc}"><td style="color:var(--text2)">${i+1}</td><td>${faze}</td><td>${count}</td><td style="color:var(--text2)">${pctV}</td><td style="color:var(--text2)">${pctP}</td><td style="color:#a32d2d">${odpad>0?'−'+odpad:''}</td><td><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${barW}%"></div></div></td></tr>`;
  }).join('');
  document.getElementById('funnelFooter').textContent=`Sklad: ${sklad||'Všechny'} | Týden: ${tyden} | Kohorta: ${celkem} | ${new Date().toLocaleString('cs-CZ')}`;
}

document.getElementById('fSklad').addEventListener('change',renderFunnel);
document.getElementById('fTyden').addEventListener('change',renderFunnel);
document.getElementById('btnFunnelRefresh').addEventListener('click',()=>{cacheHR=null;cacheNabor=null;funnelLoaded=false;loadFunnel();});

loadTracker();
</script>
</body>
</html>
